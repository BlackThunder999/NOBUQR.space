<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диспетчерская | Sibiria Airlines</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #0a0f1e, #1a1f2e); color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .back { color: #7eb8ff; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        h2 { margin-bottom: 15px; }
        input { width: 100%; padding: 14px; border-radius: 10px; background: #0d1117; border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 1em; margin-bottom: 10px; }
        button { padding: 10px 18px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; color: #fff; font-size: 0.9em; margin: 2px; }
        .btn-login { background: #0066cc; width: 100%; }
        .btn-depart { background: #e67e00; }
        .btn-arrive { background: #0d8a3e; }
        .btn-delete { background: #b53030; }
        .flight-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; gap: 8px; }
        .booking-row { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chat-box { height: 250px; overflow-y: auto; background: #0d1117; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
        .chat-row { display: flex; gap: 10px; }
        .chat-row input { flex: 1; margin-bottom: 0; }
        .chat-row button { width: auto; }
        .msg { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .time { color: #556; font-size: 0.8em; }
        .err { color: #ff6b6b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← На главную</a>
        <div class="card" id="loginBox">
            <h2>🔐 Доступ в диспетчерскую</h2>
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn-login" onclick="login()">Войти</button>
            <p id="errMsg" class="err"></p>
        </div>
        <div id="workBox" style="display:none;">
            <div class="card">
                <h2>📋 Управление рейсами</h2>
                <div id="flightsList">Загрузка...</div>
            </div>
            <div class="card">
                <h2>🎫 Бронирования</h2>
                <div id="bookingsList">Загрузка...</div>
            </div>
            <div class="card">
                <h2>💬 Чат с пилотами</h2>
                <div class="chat-box" id="chatBox"></div>
                <div class="chat-row">
                    <input type="text" id="msgInput" placeholder="Сообщение...">
                    <button class="btn-login" onclick="sendMsg()">Отпр.</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const URL = 'https://jsonkeeper.com/b/VNI3L';
        let flightsData = [];

        function login() {
            if (document.getElementById('pass').value === 'Sibiria2026') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('workBox').style.display = 'block';
                loadData();
                setInterval(loadData, 10000);
            } else {
                document.getElementById('errMsg').textContent = '❌ Неверный пароль!';
            }
        }

        function loadData() {
            fetch(URL).then(r => r.json()).then(d => {
                flightsData = d.flights;
                renderFlights();
                renderBookings();
            });
        }

        function renderFlights() {
            document.getElementById('flightsList').innerHTML = flightsData.map((f, i) => `
                <div class="flight-row">
                    <span><b>${f.flight_number}</b> | ${f.departure} → ${f.arrival} | <b>${f.status}</b></span>
                    <span>
                        ${f.status==='scheduled' ? `<button class="btn-depart" onclick="change(${i},'departed')">✈️ Взлетел</button>` : ''}
                        ${f.status==='departed' ? `<button class="btn-arrive" onclick="change(${i},'arrived')">🛬 Сел</button>` : ''}
                        <button class="btn-delete" onclick="del(${i})">🗑️</button>
                    </span>
                </div>
            `).join('');
        }

        function renderBookings() {
            let html = '';
            flightsData.forEach(f => {
                if (f.booked_seats && f.booked_seats.length > 0) {
                    html += `<div class="booking-row"><b>${f.flight_number}</b>: занято ${f.booked_seats.length} мест — ${f.booked_seats.join(', ')}</div>`;
                }
            });
            document.getElementById('bookingsList').innerHTML = html || 'Бронирований пока нет';
        }

        function change(i, s) { flightsData[i].status = s; renderFlights(); }
        function del(i) { if (confirm('Удалить рейс?')) { flightsData.splice(i, 1); renderFlights(); renderBookings(); } }

        function sendMsg() {
            const inp = document.getElementById('msgInput');
            if (!inp.value.trim()) return;
            const box = document.getElementById('chatBox');
            const now = new Date().toLocaleTimeString();
            box.innerHTML += `<div class="msg"><b>Диспетчер:</b> ${inp.value} <span class="time">${now}</span></div>`;
            box.scrollTop = box.scrollHeight;
            inp.value = '';
        }
    </script>
</body>
</html>
