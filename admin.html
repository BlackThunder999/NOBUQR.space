<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Sibiria Airlines</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a192f; color: #f0f4f8; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: #112240; border-radius: 20px; padding: 30px; margin: 20px 0; text-align: center; }
        h1 { color: #00b4d8; font-size: 28px; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; }
        .btn { padding: 14px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn:hover { transform: scale(1.02); }
        .btn-back { display: inline-block; margin-top: 20px; color: #00b4d8; text-decoration: none; font-weight: bold; }
        .password-input { padding: 12px; border-radius: 8px; border: none; width: 80%; max-width: 300px; margin: 10px 0; background: #1e293b; color: white; }
        .error { color: #ef4444; margin-top: 10px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginForm" class="card">
            <h1>🔐 Админ-панель</h1>
            <p class="subtitle">Введите пароль для управления статистикой</p>
            <input type="password" id="adminPassword" class="password-input" placeholder="Пароль" onkeydown="if(event.key==='Enter') checkPassword()">
            <br>
            <button class="btn" onclick="checkPassword()" style="background:#00b4d8; color:#0a192f;">Войти</button>
            <div id="loginError" class="error"></div>
        </div>

        <div id="adminContent" style="display:none;">
            <div class="card">
                <h1>📊 Админ-панель</h1>
                <p class="subtitle">Управление счётчиками статистики</p>
                <div class="btn-group">
                    <button class="btn btn-danger" onclick="updateStats('crashes')">💥 +1 Катастрофа</button>
                    <button class="btn btn-success" onclick="updateStats('good_landings')">✅ +1 Удачная посадка</button>
                </div>
                <a href="index.html" class="btn-back">← На главную</a>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://iljsednetiogjtowlexo.supabase.co';
        const supabaseKey = 'sb_publishable_gXxOqmU-XXnrVz8FHro2jA_ybG9EQ7O';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const ADMIN_PASSWORD = 'Sibiria2026';

        function checkPassword() {
            const input = document.getElementById('adminPassword');
            const error = document.getElementById('loginError');
            if (input.value === ADMIN_PASSWORD) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                error.textContent = '';
            } else {
                error.textContent = '❌ Неверный пароль. Попробуйте снова.';
                input.value = '';
            }
        }

        async function updateStats(type) {
            let { data, error } = await supabase.from('stats').select('*').eq('id', 1).single();
            if (error) return alert('Ошибка загрузки: ' + error.message);

            const updateData = {};
            if (type === 'crashes') updateData.crashes = (data.crashes || 0) + 1;
            else if (type === 'good_landings') updateData.good_landings = (data.good_landings || 0) + 1;

            const { error: updateError } = await supabase.from('stats').update(updateData).eq('id', 1);
            if (updateError) alert('Ошибка обновления: ' + updateError.message);
            else alert('✅ Обновлено!');
        }
    </script>
</body>
</html>
