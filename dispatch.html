<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диспетчерская — Sibiria Airlines</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a192f; color: #f0f4f8; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: #112240; border-radius: 20px; padding: 25px; margin: 20px 0; }
        h1 { color: #00b4d8; font-size: 32px; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; font-size: 14px; }
        .flight-item { background: #1e293b; border-radius: 12px; padding: 15px; margin: 10px 0; border-left: 4px solid #00b4d8; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .flight-item .info { display: flex; flex-direction: column; }
        .flight-item .info strong { color: #00b4d8; }
        .flight-item .info small { color: #94a3b8; font-size: 12px; }
        .status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-grounded { background: #64748b; color: white; }
        .status-airborne { background: #eab308; color: black; }
        .status-landed { background: #22c55e; color: black; }
        .btn-sm { padding: 6px 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-sm:hover { transform: scale(1.05); }
        .btn-airborne { background: #eab308; color: black; }
        .btn-landed { background: #22c55e; color: black; }
        .btn-delete { background: #ef4444; color: white; }

        .chat-area { max-height: 350px; overflow-y: auto; background: #0f172a; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .msg { padding: 8px 14px; margin: 6px 0; border-radius: 10px; max-width: 80%; word-wrap: break-word; }
        .msg-pilot { background: #1e3a5f; align-self: flex-start; border-left: 3px solid #00b4d8; }
        .msg-dispatcher { background: #2d3748; align-self: flex-end; border-right: 3px solid #eab308; margin-left: auto; }
        .msg-time { font-size: 10px; color: #64748b; display: block; margin-top: 3px; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .input-group select, .input-group input { padding: 10px; border-radius: 8px; border: none; background: #1e293b; color: white; flex: 1; min-width: 120px; }
        .input-group button { padding: 10px 20px; background: #00b4d8; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .input-group button:hover { background: #00d4ff; }
        .btn-back { display: inline-block; margin-top: 15px; color: #00b4d8; text-decoration: none; font-weight: bold; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .password-container { text-align: center; padding: 40px 20px; }
        .password-container input { padding: 12px; border-radius: 8px; border: none; width: 100%; max-width: 300px; background: #1e293b; color: white; margin: 10px 0; }
        .password-container .error { color: #ef4444; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container" id="appContainer">
        <div id="loginForm" class="card password-container">
            <h1>🔐 Доступ к диспетчерской</h1>
            <p style="color:#94a3b8;">Введите пароль для управления рейсами и чатом</p>
            <input type="password" id="dispatchPassword" placeholder="Пароль" onkeydown="if(event.key==='Enter') checkPassword()">
            <br>
            <button class="btn" onclick="checkPassword()" style="background:#00b4d8; color:#0a192f; border:none; padding:12px 30px; border-radius:8px; font-weight:bold; cursor:pointer;">Войти</button>
            <div id="loginError" class="error"></div>
        </div>

        <div id="dispatchContent" style="display:none;">
            <div class="card" style="border-bottom: 2px solid #00b4d8;">
                <div class="flex-between">
                    <div>
                        <h1>🎧 Диспетчерская Sibiria Airlines</h1>
                        <p class="subtitle">Управление рейсами и связь с экипажем</p>
                    </div>
                    <a href="index.html" class="btn-back">← На главную</a>
                </div>
            </div>

            <div class="card">
                <h2 style="font-size:20px; color:#00b4d8;">🛫 Активные рейсы</h2>
                <div id="flightsList"></div>
            </div>

            <div class="card">
                <h2 style="font-size:20px; color:#00b4d8;">💬 Чат экипажа</h2>
                <div id="chatMessages" class="chat-area"></div>

                <div class="input-group">
                    <select id="flightSelector">
                        <option value="">— Выберите рейс —</option>
                    </select>
                    <select id="senderRole">
                        <option value="dispatcher">🎧 Диспетчер</option>
                        <option value="pilot">👨‍✈️ Пилот</option>
                    </select>
                    <input type="text" id="messageInput" placeholder="Введите сообщение..." style="flex:2; min-width:200px;">
                    <button onclick="sendMessage()">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://iljsednetiogjtowlexo.supabase.co';
        const supabaseKey = 'sb_publishable_gXxOqmU-XXnrVz8FHro2jA_ybG9EQ7O';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const ADMIN_PASSWORD = 'Sibiria2026';

        function checkPassword() {
            const input = document.getElementById('dispatchPassword');
            const error = document.getElementById('loginError');
            if (input.value === ADMIN_PASSWORD) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('dispatchContent').style.display = 'block';
                error.textContent = '';
                loadFlights();
                subscribeToMessages();
            } else {
                error.textContent = '❌ Неверный пароль. Попробуйте снова.';
                input.value = '';
            }
        }

        let currentFlightId = null;

        async function loadFlights() {
            let { data, error } = await supabase.from('flights').select('*');
            if (error) return alert('Ошибка загрузки рейсов: ' + error.message);

            const list = document.getElementById('flightsList');
            if (data.length === 0) {
                list.innerHTML = '<p style="color:#94a3b8;">Нет активных рейсов. Создайте новый рейс в базе данных.</p>';
            } else {
                list.innerHTML = data.map(flight => `
                    <div class="flight-item" id="flight-${flight.id}">
                        <div class="info">
                            <strong>${flight.flight_number}</strong>
                            <span>${flight.destination}</span>
                            <small>🪑 ${flight.booked}/${flight.capacity} мест занято</small>
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                            <span class="status status-grounded" id="status-${flight.id}">На земле</span>
                            <button class="btn-sm btn-airborne" onclick="updateFlightStatus(${flight.id}, 'airborne')">Взлетел</button>
                            <button class="btn-sm btn-landed" onclick="updateFlightStatus(${flight.id}, 'landed')">Сел</button>
                            <button class="btn-sm btn-delete" onclick="deleteFlight(${flight.id})">🗑️</button>
                        </div>
                    </div>
                `).join('');
            }

            const selector = document.getElementById('flightSelector');
            const currentVal = selector.value;
            selector.innerHTML = '<option value="">— Выберите рейс —</option>' + data.map(f => `
                <option value="${f.id}">${f.flight_number}</option>
            `).join('');
            if (currentVal) selector.value = currentVal;
        }

        async function updateFlightStatus(flightId, status) {
            const statusMap = {
                'airborne': 'В воздухе',
                'landed': 'На земле'
            };
            const statusEl = document.getElementById(`status-${flightId}`);
            if (statusEl) {
                statusEl.innerText = statusMap[status] || status;
                statusEl.className = `status status-${status}`;
            }
        }

        async function deleteFlight(flightId) {
            if (!confirm('Удалить этот рейс и все связанные данные?')) return;
            const { error: seatsError } = await supabase.from('seats').delete().eq('flight_id', flightId);
            if (seatsError) console.error('Ошибка удаления мест:', seatsError);
            const { error: bookingsError } = await supabase.from('bookings').delete().eq('flight_id', flightId);
            if (bookingsError) console.error('Ошибка удаления броней:', bookingsError);
            const { error: messagesError } = await supabase.from('messages').delete().eq('flight_id', flightId);
            if (messagesError) console.error('Ошибка удаления сообщений:', messagesError);
            const { error } = await supabase.from('flights').delete().eq('id', flightId);
            if (error) {
                alert('Ошибка удаления рейса: ' + error.message);
            } else {
                alert('Рейс удалён.');
                loadFlights();
                loadMessages(null);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            const flightId = document.getElementById('flightSelector').value;
            const role = document.getElementById('senderRole').value;

            if (!message || !flightId) {
                alert('Выберите рейс и введите сообщение');
                return;
            }

            const { error } = await supabase.from('messages').insert({
                flight_id: parseInt(flightId),
                sender: role,
                message: message
            });

            if (error) {
                alert('Ошибка отправки: ' + error.message);
            } else {
                input.value = '';
                loadMessages(flightId);
            }
        }

        async function loadMessages(flightId) {
            if (!flightId) {
                document.getElementById('chatMessages').innerHTML = '<p style="color:#64748b;">Выберите рейс в селекторе выше</p>';
                return;
            }
            let { data, error } = await supabase
                .from('messages')
                .select('*')
                .eq('flight_id', flightId)
                .order('sent_at', { ascending: true });

            if (error) {
                document.getElementById('chatMessages').innerHTML = '<p style="color:#64748b;">Ошибка загрузки сообщений</p>';
                return;
            }

            const container = document.getElementById('chatMessages');
            if (data.length === 0) {
                container.innerHTML = '<p style="color:#64748b;">Нет сообщений. Начните общение!</p>';
            } else {
                container.innerHTML = data.map(msg => `
                    <div class="msg ${msg.sender === 'pilot' ? 'msg-pilot' : 'msg-dispatcher'}">
                        <strong>${msg.sender === 'pilot' ? '👨‍✈️ Пилот' : '🎧 Диспетчер'}</strong>
                        ${msg.message}
                        <span class="msg-time">${new Date(msg.sent_at).toLocaleTimeString()}</span>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            }
        }

        function subscribeToMessages() {
            supabase
                .channel('messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                    const newMsg = payload.new;
                    const currentFlight = document.getElementById('flightSelector').value;
                    if (newMsg.flight_id == currentFlight) {
                        loadMessages(currentFlight);
                    }
                })
                .subscribe();
        }

        document.getElementById('flightSelector').addEventListener('change', function() {
            const val = this.value;
            if (val) {
                loadMessages(val);
            } else {
                document.getElementById('chatMessages').innerHTML = '<p style="color:#64748b;">Выберите рейс в селекторе выше</p>';
            }
        });
    </script>
</body>
</html>
